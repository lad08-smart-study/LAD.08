<!doctype html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>LOK.A.D.08</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-row">
        <div class="logo" aria-label="LOK.A.D.08">LOK.A.D.08</div>
        <div class="tagline" data-i18n="tagline">Plateforme d'étude gratuite pour étudiants en médecine</div>
      </div>
      <div class="muted small" data-i18n="tagline2">Units → Subjects → Lessons • Pomodoro • Spaced repetition • Planner • AI (server mode)</div>
    </div>

    <div class="top-actions">
      <div class="lang-switch" role="group" aria-label="Language">
        <button class="chip" type="button" data-lang="fr">FR</button>
        <button class="chip" type="button" data-lang="en">EN</button>
        <button class="chip" type="button" data-lang="ar">AR</button>
      </div>
      <div id="userBadge" class="user-badge hidden" aria-live="polite"></div>
      <button id="logoutBtn" class="btn btn-outline hidden" type="button" data-i18n="logout">Déconnexion</button>
    </div>
  </header>

  <nav id="nav" class="nav hidden" aria-label="Primary">
    <a href="#dashboard" data-route="dashboard" class="navlink" data-i18n="nav_dashboard">Dashboard</a>
    <a href="#workspace" data-route="workspace" class="navlink" data-i18n="nav_workspace">Workspace</a>
    <a href="#planner" data-route="planner" class="navlink" data-i18n="nav_planner">Planner</a>
    <a href="#reviews" data-route="reviews" class="navlink" data-i18n="nav_reviews">Reviews</a>
    <a href="#pomodoro" data-route="pomodoro" class="navlink" data-i18n="nav_pomodoro">Pomodoro</a>
    <a href="#ai" data-route="ai" class="navlink" data-i18n="nav_ai">AI Assistant</a>
    <a href="#settings" data-route="settings" class="navlink" data-i18n="nav_settings">Settings</a>
  </nav>

  <main id="main" class="main" role="main"></main>

  <footer class="footer">
    <div class="small muted">
      <span class="mono">LOK.A.D.08</span> • Static MVP • Data saved locally in your browser
    </div>
  </footer>

  <!-- Modal -->
  <div id="modalRoot" class="modal-root hidden" role="dialog" aria-modal="true" aria-label="Dialog">
    <div class="modal" role="document">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">Dialog</div>
        <button id="modalClose" class="icon-btn" type="button" aria-label="Close">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </div>

  <noscript>
    <div class="container">
      <div class="card">
        <h2>JavaScript required</h2>
        <p>This app is a client-side SPA and needs JavaScript enabled.</p>
      </div>
    </div>
  </noscript>

  <script src="assets/app.js" defer></script>
</body>
</html>
